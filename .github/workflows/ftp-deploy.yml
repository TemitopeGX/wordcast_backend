name: Deploy Laravel Backend to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to cPanel
    runs-on: self-hosted # Uses your self-hosted runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Change this if your Laravel requires a different version
          tools: composer:v2

      - name: Install Dependencies (Vendor Folder)
        run: composer install --optimize-autoloader --no-dev

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Keep this as / as it deploys to the root of the FTP account
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            .env.example
            .env
            tests/**
